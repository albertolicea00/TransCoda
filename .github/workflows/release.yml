name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# Allow the workflow to create the GitHub Release and upload artifacts
permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup pnpm (matches version in package.json)
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Setup Rust stable toolchain
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # Cache Cargo dependencies and build artifacts to speed up builds
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # Install Linux-specific dependencies needed for compiling WebKit/GTK for Tauri
      - name: Install system dependencies (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libsoup-3.0-dev

      # Install project dependencies
      - name: Install project dependencies
        run: pnpm install --frozen-lockfile

      # Build the desktop app and create/upload draft release on GitHub
      - name: Build and Package Tauri App
        uses: tauri-apps/tauri-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__
          releaseName: 'TransCoda v__VERSION__'
          releaseBody: 'See the assets below to download this version.'
          releaseDraft: true
          prerelease: false
